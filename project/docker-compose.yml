services:
  db:
    image: postgis/postgis:16-3.4
    container_name: water_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: water
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d water"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./api
    container_name: water_api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/water
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: water_web
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro

volumes:
  db_data:
